<mat-card class="card-capa">
	  <img mat-card-image [src]="filme.capa" alt="Capa do filme">
	  <mat-card-content>
	    <ul>
	      <li>{{filme.nome}}</li>
	      <li>{{filme.duracao}}</li>
	    </ul>
	  </mat-card-content>
	  <mat-card-actions>
	    <a mat-flat-button color="primary">VER DETALHES</a>
	  </mat-card-actions>
	</mat-card>
